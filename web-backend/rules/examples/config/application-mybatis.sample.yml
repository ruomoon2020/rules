# 样板：合并到业务项目 application.yml（按环境覆盖）

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/app?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.company.product.modules
  configuration:
    map-underscore-to-camel-case: true
    # database-id: mysql   # 或由 DatabaseIdProvider 自动识别
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

# PostgreSQL 环境示例（单独 profile：application-postgresql.yml）
# spring.datasource.url: jdbc:postgresql://localhost:5432/app
# spring.datasource.driver-class-name: org.postgresql.Driver

flyway:
  enabled: true
  locations: classpath:db/migration/mysql
  # postgresql profile: classpath:db/migration/postgresql
