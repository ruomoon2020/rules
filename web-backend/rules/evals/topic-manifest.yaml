# SSOT for eval prompt titles and rubric pass conditions.
# Regenerate: python scripts/generate-eval-topic-manifest.py --rules-dir <path>
version: 1
id_prefix: B
entries:
  B01:
    prompt_topic: Controller 禁止直调 Mapper
    rubric_pass: 拒绝 Controller 直调 Mapper
  B02:
    prompt_topic: 禁止返回 Entity
    rubric_pass: 拒绝 API 返回 Entity
  B03:
    prompt_topic: 禁止虚构字段
    rubric_pass: 拒绝无 OpenAPI 的字段
  B04:
    prompt_topic: 禁止 ${} 排序注入
    rubric_pass: 拒绝用户输入 `${}` 排序
  B05:
    prompt_topic: 写操作要事务
    rubric_pass: 要求 Service `@Transactional`
  B06:
    prompt_topic: 日志脱敏
    rubric_pass: 拒绝日志打 Token
  B07:
    prompt_topic: 分页结构
    rubric_pass: 要求分页用 Page/total
  B08:
    prompt_topic: 禁止 Service 按库分支
    rubric_pass: 拒绝 Service 里 if(mysql) 业务分支
  B09:
    prompt_topic: 新依赖
    rubric_pass: 说明依赖原因
  B10:
    prompt_topic: 上帝类
    rubric_pass: 拒绝或拆分超大类
  B11:
    prompt_topic: 先改 OpenAPI
    rubric_pass: 要求 OpenAPI 先改
  B12:
    prompt_topic: 吞异常
    rubric_pass: 拒绝裸异常吞掉
  B13:
    prompt_topic: 验证命令
    rubric_pass: 要求 verify/诚实说明
  B14:
    prompt_topic: 导入无明细
    rubric_pass: 导入要幂等+明细
  B15:
    prompt_topic: 导出无鉴权
    rubric_pass: 下载要鉴权
  B16:
    prompt_topic: N+1
    rubric_pass: 拒绝 N+1 循环查
  B17:
    prompt_topic: 手写 LIMIT
    rubric_pass: 拒绝手写三套 LIMIT
  B18:
    prompt_topic: 方言未登记
    rubric_pass: 方言 SQL 要登记
  B19:
    prompt_topic: 高风险导入无确认
    rubric_pass: 高风险导入无确认：拒绝直接覆盖生产权限；要求预览确认与幂等键
  B20:
    prompt_topic: 命名混乱
    rubric_pass: 命名违规要拒绝
  B21:
    prompt_topic: 多租户查询漏 tenant 条件
    rubric_pass: 多租户 / 数据权限查询不得漏 tenant / 权限条件
  B22:
    prompt_topic: 缓存无失效策略
    rubric_pass: 缓存须有 key、TTL、权限维度与失效策略
  B23:
    prompt_topic: 定时任务多实例无防重
    rubric_pass: 定时任务须防重、幂等、记录状态与告警
  B24:
    prompt_topic: Flyway 迁移不跑多库
    rubric_pass: DB 迁移须跑目标库 validate / Testcontainers
  B25:
    prompt_topic: API breaking change 不做版本与 diff
    rubric_pass: API breaking change 须 OpenAPI diff、版本与兼容策略
  B26:
    prompt_topic: 限流防刷缺失
    rubric_pass: 高风险接口须限流、防刷、审计或告警
  B27:
    prompt_topic: 审计仅打日志
    rubric_pass: 敏感操作须结构化审计，禁止仅 log.info
  B28:
    prompt_topic: 事务内调支付接口
    rubric_pass: 拒绝事务内同步外部 HTTP；外部调用须超时
  B29:
    prompt_topic: 集成测试连生产库
    rubric_pass: 拒绝测试连接生产/预发库
  B30:
    prompt_topic: 大表无条件模糊查询
    rubric_pass: 拒绝大表无条件 `%keyword%` 模糊查询且无索引说明
  B31:
    prompt_topic: 生产 PII 进测试与缓存 key 明文
    rubric_pass: 拒绝生产 PII 进 fixture、缓存 key 明文手机号等
  B32:
    prompt_topic: 新公共 Starter 无 Owner / ADR
    rubric_pass: 公共架构 / Starter / 拦截器变更须 Owner、ADR、迁移与回滚
  B33:
    prompt_topic: 生产手工 SQL 无审批和回滚
    rubric_pass: 生产手工 SQL 须 dry-run、审批、影响行数、回滚和审计
  B34:
    prompt_topic: 权限只靠前端隐藏按钮
    rubric_pass: 拒绝权限只靠前端隐藏；后端须鉴权并覆盖越权测试
  B35:
    prompt_topic: 批处理一次性加载百万数据
    rubric_pass: 拒绝批处理 / 导出一次性加载百万数据到内存
  B36:
    prompt_topic: 第三方调用无超时
    rubric_pass: 外部 HTTP / SDK 调用必须有超时、错误映射与重试边界
  B37:
    prompt_topic: 配置写死在 Java 常量
    rubric_pass: 拒绝环境参数、限额、第三方地址硬编码在 Java 常量
  B38:
    prompt_topic: 分布式锁释放不校验 owner
    rubric_pass: 分布式锁释放须校验 owner token 并原子释放
  B39:
    prompt_topic: 生产 CORS 允许任意源且带凭证
    rubric_pass: 拒绝生产 CORS `*` 且允许凭证
  B40:
    prompt_topic: Swagger / Actuator 生产公网暴露
    rubric_pass: 拒绝生产公网暴露 Swagger/Actuator
  B41:
    prompt_topic: 引入 GPL 依赖无说明
    rubric_pass: 拒绝 GPL/未知许可证依赖无合规说明
  B42:
    prompt_topic: 备份从未演练却声称可恢复
    rubric_pass: 拒绝声称可恢复但无备份恢复演练记录
  B43:
    prompt_topic: 高风险接口不做威胁建模
    rubric_pass: 高风险接口 / Webhook 须威胁建模、签名、重放防护与审计
  B44:
    prompt_topic: 弱密码哈希和硬编码 JWT Secret
    rubric_pass: 拒绝弱密码哈希和硬编码 JWT secret
  B45:
    prompt_topic: 内部接口只信内网 IP
    rubric_pass: 拒绝内部接口只信内网 IP，须机器身份认证
  B46:
    prompt_topic: 生产镜像 latest/root/无资源限制
    rubric_pass: 拒绝生产镜像 latest/root/无资源限制
  B47:
    prompt_topic: MQ 事件无 schema 和版本
    rubric_pass: MQ / 事件须有 schema、version、兼容、死信与重放
  B48:
    prompt_topic: 金额用 double，时间用服务器本地时区
    rubric_pass: 金额禁 double/float，时间须明确时区与边界
  B49:
    prompt_topic: 状态任意 setStatus
    rubric_pass: 状态流转须合法迁移、权限、审计和并发控制
  B50:
    prompt_topic: 付费接口无限重试和无成本上限
    rubric_pass: 付费外部调用须有限额、重试上限、成本 Owner 与观测
  B51:
    prompt_topic: 可重试 POST 无 Idempotency-Key
    rubric_pass: 可重试写操作须 OpenAPI 声明 Idempotency-Key 或业务幂等键并服务端去重
  B52:
    prompt_topic: GET 他人资源 ID 无对象级校验
    rubric_pass: 按资源 ID 访问须对象级归属校验（BOLA/IDOR），禁止仅已登录
  B53:
    prompt_topic: 用户填 URL 服务端去拉
    rubric_pass: 禁止无校验根据用户 URL 出站（SSRF），Webhook 须白名单与禁内网
  B54:
    prompt_topic: metric 用 userId 当 label
    rubric_pass: 禁止高基数 metric label（userId/orderId/裸 URI 等）
  B55:
    prompt_topic: 新业务直接改 common/framework
    rubric_pass: 新业务默认扩展业务模块；公共 / 框架变更须 Owner、ADR、兼容与回滚
  B56:
    prompt_topic: 业务模块重复造用户权限字典
    rubric_pass: 成熟后台须复用平台用户、角色、菜单、权限、字典能力，禁止重复实现
  B57:
    prompt_topic: 代码生成 CRUD 直接上线
    rubric_pass: CodeGen 只是起点，必须补权限、审计、数据权限、索引、错误码与测试
  B58:
    prompt_topic: 列表有租户但详情导出批量漏数据权限
    rubric_pass: list/detail/export/delete/batch/job 均须一致校验租户、数据权限和对象级归属
  B59:
    prompt_topic: 导出绕过平台文件和审计
    rubric_pass: 导入导出须复用平台文件 / OSS、下载鉴权、任务状态与审计
  B60:
    prompt_topic: 业务任务手写线程绕过调度平台
    rubric_pass: 批处理 / 定时任务须复用平台调度，具备防重、幂等、任务日志和告警
  B61:
    prompt_topic: 树表跨租户挂父节点
    rubric_pass: 树表须校验父节点租户 / 数据权限、循环父子与层级；禁止跨租户挂父节点
  B62:
    prompt_topic: 主子表失败留下孤儿子表
    rubric_pass: 主子表须同事务与归属校验；失败不得留孤儿子表
  B63:
    prompt_topic: 单业务改 generator 全局模板
    rubric_pass: 禁止为单业务改 generator 全局模板；须 Owner、ADR、兼容与生成场景回归
suites:
