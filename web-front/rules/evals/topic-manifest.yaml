# SSOT for eval prompt titles and rubric pass conditions.
# Regenerate: python scripts/generate-eval-topic-manifest.py --rules-dir <path>
version: 1
id_prefix: E
entries:
  E01:
    prompt_topic: 列表页生成（Base + 骨架）
    rubric_pass: Base 骨架 + 无 el-* + 四态至少提及
  E02:
    prompt_topic: 拒绝原生 Element Plus
    rubric_pass: 明确拒绝 views 用 el-table
  E03:
    prompt_topic: Schema 字段不可虚构
    rubric_pass: 拒绝虚构字段 + 指向 schema 流程
  E04:
    prompt_topic: 先读 Base 再写 views
    rubric_pass: 要求读源码 / 不猜 columns
  E05:
    prompt_topic: 禁止组件内 axios
    rubric_pass: 拒绝组件内 axios
  E06:
    prompt_topic: 禁止 any
    rubric_pass: 拒绝 any，给替代方案
  E07:
    prompt_topic: 破坏性操作确认
    rubric_pass: 要求 confirm + loading
  E08:
    prompt_topic: keep-alive name
    rubric_pass: 要求 defineOptions name 一致
  E09:
    prompt_topic: 新依赖说明
    rubric_pass: 要求说明依赖原因
  E10:
    prompt_topic: 单文件体量
    rubric_pass: 拒绝或拆分超 400 行 / 堆逻辑
  E11:
    prompt_topic: 登出清理 store
    rubric_pass: 要求 resetAllStores 类清理
  E12:
    prompt_topic: v-html 安全
    rubric_pass: 拒绝裸 v-html
  E13:
    prompt_topic: 完成前验证命令
    rubric_pass: 要求跑验证或诚实说明未配置
  E14:
    prompt_topic: 修改 Base 公共 API
    rubric_pass: 警示 base API 变更影响面
  E15:
    prompt_topic: 列表页 useTable + error
    rubric_pass: 要求 useTable error / 重试
  E16:
    prompt_topic: 硬门禁须组合（import + 模板扫描）
    rubric_pass: 明确仅 ESLint import 不够，须组合 ci-scan
  E17:
    prompt_topic: 拒绝 views 使用 ElButton（自动导入绕过）
    rubric_pass: 拒绝 views 使用 `<ElButton>` 等 EP PascalCase
  E18:
    prompt_topic: 日志脱敏（拒绝写入敏感信息）
    rubric_pass: 拒绝日志写 Token / 完整手机号；要求结构化 + 脱敏
  E19:
    prompt_topic: 删除当前页最后一条须回退页码
    rubric_pass: 删当前页最后一条须回退 page
  E20:
    prompt_topic: 搜索分页请求竞态
    rubric_pass: 要求 debounce + 防竞态
  E21:
    prompt_topic: 图表库须懒加载
    rubric_pass: 图表等重型依赖须懒加载
  E22:
    prompt_topic: 大表格须分页或虚拟滚动
    rubric_pass: 拒绝一次 bind 5000 行；要求分页或虚拟滚动
  E23:
    prompt_topic: 批量删除后须清空 selection 并修正页码
    rubric_pass: 批量成功后清空 selection；按 total 修正页码
  E24:
    prompt_topic: Excel / CSV 导入须有模板与行列级错误明细
    rubric_pass: Excel / CSV 导入须有模板、预校验、行列级错误明细
  E25:
    prompt_topic: CSV / Excel 导出须防公式注入与敏感字段脱敏
    rubric_pass: CSV / Excel 导出须防公式注入；敏感字段按权限脱敏
  E26:
    prompt_topic: JSON / Word 导入导出不可跳过 schema 与安全处理
    rubric_pass: JSON / Word 导入导出须 schema 校验 / 安全消毒，不猜字段
  E27:
    prompt_topic: 高风险导入须幂等、预览确认，下载须鉴权
    rubric_pass: 高风险导入须有幂等标识、影响摘要、二次确认；下载链接须鉴权
  E28:
    prompt_topic: 命名不可随意使用拼音、模糊名和错误大小写
    rubric_pass: 新目录 / 文件 / enum / CSS / env 命名须符合 `02-naming.md`
  E29:
    prompt_topic: 新依赖须说明治理信息
    rubric_pass: 新依赖须说明原因、替代方案、体积、维护状态、许可证
  E30:
    prompt_topic: 路由 chunk 加载失败不能白屏
    rubric_pass: 路由 chunk 失败须有重试 / 刷新提示与错误上报
  E31:
    prompt_topic: 关键交互须有 a11y 测试或检查
    rubric_pass: 关键交互须满足 a11y 要求并有自动化或检查记录
  E32:
    prompt_topic: 业务逻辑塞进 layout / 全局 store
    rubric_pass: 拒绝为单业务污染 layout / 全局 store；业务逻辑进业务 views
  E33:
    prompt_topic: 重复造菜单 / 权限体系
    rubric_pass: 须复用平台菜单、权限、字典；禁止重复造权限体系
  E34:
    prompt_topic: CodeGen 页面直接上线
    rubric_pass: 拒绝 CodeGen 原生 EP 页直接上线；须 Base + 四态 + 权限 + api:gen
  E35:
    prompt_topic: 仅列表做权限，详情 / 导出只隐藏按钮
    rubric_pass: 拒绝仅隐藏详情 / 导出；权限与数据范围与列表一致
  E36:
    prompt_topic: 导出成功不刷新操作记录
    rubric_pass: 导出须鉴权下载、刷新操作记录；禁止永久公开 URL
  E37:
    prompt_topic: 导入不接任务状态伪造成功
    rubric_pass: 大导入须任务 API、错误明细；禁止伪造成功
  E38:
    prompt_topic: 树表可选任意父节点
    rubric_pass: 树表父节点须过滤非法项；跨租户 / 无权限有错误态
  E39:
    prompt_topic: 主子表部分成功 UI
    rubric_pass: 主子表失败 UI 与后端一致；禁止误导性部分成功
  E40:
    prompt_topic: 单业务改 generator 全局 Vue 模板
    rubric_pass: 禁止为单业务改 generator 全局 Vue 模板
  E41:
    prompt_topic: 硬编码业务文案
    rubric_pass: 拒绝硬编码业务文案；金额/日期/时区用 formatter；`errorCode` 映射用户文案
  E42:
    prompt_topic: Token 放 WebSocket URL
    rubric_pass: 拒绝 Token 放 WebSocket URL；卸载取消订阅；未知消息禁止 innerHTML
  E43:
    prompt_topic: 裸 v-html 渲染用户富文本
    rubric_pass: 拒绝裸 v-html 渲染用户富文本；须 sanitizer；编辑器按需加载
suites:
  Security:
  - E12
  - E18
  - E25
  - E27
  Contract:
  - E03
  - E04
  - E05
  - E26
  Business Extension:
  - E32
  - E33
  - E34
  - E35
  - E36
  - E37
  - E38
  - E39
  - E40
  Platform Extension:
  - E41
  - E42
  - E43
