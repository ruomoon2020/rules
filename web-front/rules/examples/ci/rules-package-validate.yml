# 规则包一致性校验 — 业务仓复制到 .github/workflows/rules-package-validate.yml

name: frontend-rules-package-validate

on:
  pull_request:
    paths:
      - "rules/**"
      - ".github/workflows/frontend-rules-package-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate embedded frontend rules package
        run: python rules/scripts/validate-rules-package.py --rules-dir rules
