# Monorepo：三端规则包一致性校验

name: validate-rules-packages

on:
  pull_request:
    paths:
      - "web-backend/rules/**"
      - "web-front/rules/**"
      - "miniapp/rules/**"
      - "contracts/openapi.yaml"
      - "contracts/openapi.baseline.yaml"
      - "scripts/**"
      - "docs/**"
      - "examples/**"
      - ".github/workflows/validate-rules-packages.yml"
  push:
    branches: [main, master]
    paths:
      - "web-backend/rules/**"
      - "web-front/rules/**"
      - "miniapp/rules/**"
      - "scripts/**"

jobs:
  validate-backend-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: pip install pyyaml
      - name: Run backend validator unit tests
        run: python -m unittest discover -s web-backend/rules/scripts/tests -v
      - name: Validate backend rules package
        run: python web-backend/rules/scripts/validate-rules-package.py

  validate-frontend-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: pip install pyyaml
      - name: Run frontend validator unit tests
        run: python -m unittest discover -s web-front/rules/scripts/tests -v
      - name: Validate frontend rules package
        run: python web-front/rules/scripts/validate-rules-package.py

  validate-miniapp-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: pip install pyyaml
      - name: Run miniapp validator unit tests
        run: python -m unittest discover -s miniapp/rules/scripts/tests -v
      - name: Validate miniapp rules package
        run: python miniapp/rules/scripts/validate-rules-package.py

  validate-governance-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: pip install pyyaml
      - name: Regenerate eval manifests (consistency check)
        run: python scripts/generate-eval-topic-manifest.py --all
      - name: Governance script unit tests
        run: python -m unittest discover -s scripts/tests -v
      - name: Adoption fixture check
        run: python scripts/check-project-adoption.py --repo examples/adoption-fixture/frontend --stack frontend
