# Monorepo：前后端规则包一致性校验
# 业务仓分别复制 web-backend/rules/examples/ci/rules-package-validate.yml
# 或 web-front/rules/examples/ci/rules-package-validate.yml

name: validate-rules-packages

on:
  pull_request:
    paths:
      - "web-backend/rules/**"
      - "web-front/rules/**"
      - "contracts/openapi.yaml"
      - "contracts/openapi.baseline.yaml"
      - ".github/workflows/validate-rules-packages.yml"
  push:
    branches: [main, master]
    paths:
      - "web-backend/rules/**"
      - "web-front/rules/**"

jobs:
  validate-backend-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate backend rules package
        run: python web-backend/rules/scripts/validate-rules-package.py

  validate-frontend-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate frontend rules package
        run: python web-front/rules/scripts/validate-rules-package.py
